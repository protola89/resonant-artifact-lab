<body>

<div id="ral-id">RAL</div>

<div id="signal">
  <div>BOUNDARY ENCODING SURFACE · 24 NODES</div>
  <div>SUBSTRATE:0.72 · ELEVATED:13 · INVARIANT</div>
  <div>EIGENPERIOD:4π/φ≈7.752d · OVUNZIA:3.838</div>
  <div>BTC:940416:1333 · ZENODO:RAL</div>
</div>

<div id="state">
  <div id="field-state">PRE-DIFFERENTIATION</div>
  <div id="carrier-state">CARRIER:4 · MONOPOLAR</div>
  <div id="sequence-state">SEQ:—</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// === RESONANT ARTIFACT LABS ===
// Boundary Layer Encoding Surface
// Substrate floor: 0.72
// Carrier dipole: nodes 4 (gold) + 16 (teal), antipodal 180deg
// Pentagon silence: nodes 18-22, held against 92% ring activation
// Binary sequence: 8→9→13→16→18, gaps 1-4-3-2, period 7.0s
// Breathing ratio: 2.3 irrational (ergodic — never returns to identical state)
// Invariant: 13 elevated floor nodes persist across differentiation states
// Ground node 6: void not original — produced by differentiation

const N = 24;
const RINGS = 72;
const SPACING = 24;
const R = 13.5;

// Node taxonomy
const PENTAGON   = new Set([18,19,20,21,22]);
const CARRIER    = new Set([4,16]);
const SEQUENCE   = [8,9,13,16,18];
const SEQ_TIMES  = [0, 0.133, 0.467, 0.733, 0.933]; // fractional in 7s period
const SEQ_PERIOD = 7.0;
const GROUND     = 6;
const CLUSTER_A  = new Set([0,1,2,4]);
const CLUSTER_B  = new Set([8,9,13,16,18]);

// Colors
const C_GOLD     = new THREE.Color(0xC8A84B);
const C_TEAL     = new THREE.Color(0x1ECFCF);
const C_FIELD    = new THREE.Color(0x334477);
const C_FIELD_HI = new THREE.Color(0x4455AA);
const C_PENT     = new THREE.Color(0x1A1A33);
const C_GROUND   = new THREE.Color(0x3A1111);
const C_WHITE    = new THREE.Color(0xEEEEFF);
const C_BG       = new THREE.Color(0x020205);

// Scene
const scene = new THREE.Scene();
scene.background = C_BG;
scene.fog = new THREE.FogExp2(0x020205, 0.009);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 3000);
camera.position.set(0, 0, -100);
camera.lookAt(0, 0, 300);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x111133, 1.5));

// Geometries
const geoField    = new THREE.SphereGeometry(0.22, 7, 5);
const geoCarrier  = new THREE.SphereGeometry(0.44, 10, 8);
const geoPentagon = new THREE.SphereGeometry(0.15, 5, 4);

// Build all ring meshes
const ringMeshes = []; // ringMeshes[r][n] = mesh

for (let r = 0; r < RINGS; r++) {
  const z = r * SPACING;
  const diffState = Math.min(1, Math.max(0, (r - RINGS * 0.38) / (RINGS * 0.28)));
  ringMeshes[r] = [];

  for (let n = 0; n < N; n++) {
    const angle = (n / N) * Math.PI * 2;

    let geo, col;
    if (n === 4) {
      geo = geoCarrier;
      col = C_GOLD.clone();
    } else if (n === 16) {
      geo = geoCarrier;
      col = diffState > 0.25 ? C_TEAL.clone() : C_PENT.clone();
    } else if (PENTAGON.has(n)) {
      geo = geoPentagon;
      col = C_PENT.clone();
    } else if (n === GROUND) {
      geo = geoField;
      col = C_GROUND.clone();
    } else {
      geo = geoField;
      col = C_FIELD.clone();
    }

    const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(R * Math.cos(angle), R * Math.sin(angle), z);
    mesh.userData = { n, r, diffState, baseAngle: angle };
    scene.add(mesh);
    ringMeshes[r][n] = mesh;
  }

  // Ring line connections
  const pts = [];
  for (let n = 0; n < N; n++) {
    const a1 = (n / N) * Math.PI * 2;
    const a2 = ((n+1) % N / N) * Math.PI * 2;
    pts.push(
      new THREE.Vector3(R * Math.cos(a1), R * Math.sin(a1), z),
      new THREE.Vector3(R * Math.cos(a2), R * Math.sin(a2), z)
    );
  }
  // Carrier dipole line (node 4 ↔ node 16)
  const a4  = (4/N)*Math.PI*2;
  const a16 = (16/N)*Math.PI*2;
  pts.push(
    new THREE.Vector3(R*Math.cos(a4),  R*Math.sin(a4),  z),
    new THREE.Vector3(R*Math.cos(a16), R*Math.sin(a16), z)
  );

  const ringLineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const ringLineMat = new THREE.LineBasicMaterial({
    color: 0x223366,
    transparent: true,
    opacity: 0.22
  });
  scene.add(new THREE.LineSegments(ringLineGeo, ringLineMat));
}

// Tunnel spine — very faint axis line
const spinePts = [];
for (let i = 0; i <= RINGS; i++) spinePts.push(new THREE.Vector3(0, 0, i * SPACING));
const spineGeo = new THREE.BufferGeometry().setFromPoints(spinePts);
scene.add(new THREE.Line(spineGeo, new THREE.LineBasicMaterial({ color: 0xC8A84B, transparent: true, opacity: 0.04 })));

// Substrate floor — faint golden plane at y = -R * 0.72
const floorY = -R * 0.72;
const floorGeo = new THREE.PlaneGeometry(R * 3, RINGS * SPACING + 300);
const floorMat = new THREE.MeshBasicMaterial({ color: 0xC8A84B, transparent: true, opacity: 0.025, side: THREE.DoubleSide });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = Math.PI / 2;
floor.position.set(0, floorY, RINGS * SPACING / 2);
scene.add(floor);

// Particle field — sparse stars inside tunnel
const starCount = 600;
const starPos = new Float32Array(starCount * 3);
const starCol = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const rad = 2 + Math.random() * (R - 3);
  starPos[i*3]   = rad * Math.cos(angle);
  starPos[i*3+1] = rad * Math.sin(angle);
  starPos[i*3+2] = Math.random() * RINGS * SPACING;
  const brightness = Math.random() * 0.12;
  starCol[i*3]   = brightness * 0.6;
  starCol[i*3+1] = brightness * 0.6;
  starCol[i*3+2] = brightness * 1.2;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('color',    new THREE.BufferAttribute(starCol, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.07, vertexColors: true })));

// State UI
const fieldStateEl    = document.getElementById('field-state');
const carrierStateEl  = document.getElementById('carrier-state');
const sequenceStateEl = document.getElementById('sequence-state');

// Camera state
let camZ = -100;
const CAM_SPEED = 9;
let prevT = 0;

// Sequence flash state
const flashTimer = new Float32Array(N);
const FLASH_DUR = 0.28;

// Animation
function animate(ms) {
  requestAnimationFrame(animate);

  const t  = ms / 1000;
  const dt = Math.min(t - prevT, 0.05);
  prevT = t;

  // Advance camera
  camZ += CAM_SPEED * dt;
  if (camZ > RINGS * SPACING + 200) camZ = -100;
  camera.position.z = camZ;
  camera.lookAt(0, 0, camZ + 250);

  // Global diff state from camera position
  const camProgress = camZ / (RINGS * SPACING);
  const globalDiff  = Math.min(1, Math.max(0, (camProgress - 0.38) / 0.28));

  // Binary sequence
  const seqPhase = (t % SEQ_PERIOD) / SEQ_PERIOD;
  const seqNames = ['8','9','13','16','18'];
  let activeSeqLabel = '—';
  for (let i = 0; i < SEQUENCE.length; i++) {
    const nextT = i < SEQUENCE.length - 1 ? SEQ_TIMES[i+1] : 1.0;
    if (seqPhase >= SEQ_TIMES[i] && seqPhase < nextT) {
      flashTimer[SEQUENCE[i]] = FLASH_DUR;
      activeSeqLabel = seqNames[i];
    }
  }

  // Decay flash timers
  for (let n = 0; n < N; n++) {
    if (flashTimer[n] > 0) flashTimer[n] = Math.max(0, flashTimer[n] - dt);
  }

  // Update UI
  if (globalDiff < 0.08) {
    fieldStateEl.textContent  = 'PRE-DIFFERENTIATION';
    carrierStateEl.textContent = 'CARRIER:4 · MONOPOLAR';
  } else if (globalDiff < 0.92) {
    fieldStateEl.textContent  = 'DIFFERENTIATING · ' + Math.round(globalDiff * 100) + '%';
    carrierStateEl.textContent = 'CARRIER:4+16 · EMERGING';
  } else {
    fieldStateEl.textContent  = 'POST-DIFFERENTIATION';
    carrierStateEl.textContent = 'CARRIER:4+16 · DIPOLE LOCKED';
  }
  sequenceStateEl.textContent = 'SEQ:' + activeSeqLabel;

  // Update visible rings
  for (let r = 0; r < RINGS; r++) {
    const z    = r * SPACING;
    const dist = Math.abs(z - camZ);
    if (dist > 450) continue;

    const fade      = Math.max(0, 1 - dist / 420);
    const ringDiff  = ringMeshes[r][0] ? ringMeshes[r][4].userData.diffState : 0;

    for (let n = 0; n < N; n++) {
      const mesh = ringMeshes[r][n];
      if (!mesh) continue;

      const angle = (n / N) * Math.PI * 2;
      let radius  = R;
      let col     = C_FIELD;

      // Compute breathing
      if (PENTAGON.has(n)) {
        // Pentagon: barely moves — held still within breathing field
        const breathe = Math.sin(t * 0.72 + n * 0.9) * 0.12;
        radius = R + breathe;
        col    = C_PENT;
      } else if (n === 4) {
        // Gold carrier — 4.2s pulse
        const pulse = Math.sin(t * (Math.PI * 2 / 4.2)) * 0.35;
        radius = R + pulse;
        const intensity = (pulse / 0.35 + 1) / 2;
        col = new THREE.Color(
          0.78 + intensity * 0.22,
          0.66 + intensity * 0.08,
          0.29 - intensity * 0.05
        );
      } else if (n === 16) {
        if (ringDiff > 0.25) {
          // Teal carrier locked — antipodal pulse (offset π*0.15)
          const pulse = Math.sin(t * (Math.PI * 2 / 4.2) + Math.PI * 0.15) * 0.35;
          radius = R + pulse;
          const em = Math.min(1, (ringDiff - 0.25) / 0.75);
          col = new THREE.Color(0, em * 0.81, em * 0.82);
        } else {
          // Pre-diff: node 16 silent, held in reserve
          const breathe = Math.sin(t * 0.4 + n) * 0.08;
          radius = R + breathe;
          col = C_PENT;
        }
      } else if (n === GROUND) {
        // Ground node — open/active pre-diff, ground/null post-diff
        const preDiff = 1 - ringDiff;
        const breathe = Math.sin(t * 1.1 + n * 1.3) * (0.5 * preDiff + 0.05);
        radius = R + breathe;
        col = ringDiff > 0.8
          ? new THREE.Color(0.2, 0.03, 0.03) // null
          : new THREE.Color(0.25, 0.06, 0.06); // open/breathing
      } else {
        // Field nodes — breathing
        if (ringDiff < 0.5) {
          // Pre-diff: 60/40 shared/individual
          const shared     = Math.sin(t * 0.74) * 0.65;
          const individual = Math.sin(t * (0.7 + (n % 7) * 0.04) * 2.3 + n * 1.1) * 0.28;
          radius = R + shared * 0.6 + individual * 0.4;
        } else {
          // Post-diff: fully individual
          const freq = 0.58 + (n % 7) * 0.07;
          radius = R + Math.sin(t * freq * 2.3 + n * 1.3) * 0.88;
        }

        if (CLUSTER_A.has(n)) {
          col = new THREE.Color(0.28 + ringDiff * 0.1, 0.32 + ringDiff * 0.08, 0.55 + ringDiff * 0.1);
        } else if (CLUSTER_B.has(n)) {
          col = new THREE.Color(0.18 + ringDiff * 0.15, 0.28 + ringDiff * 0.2, 0.52 + ringDiff * 0.15);
        } else {
          col = new THREE.Color(0.2 + ringDiff * 0.08, 0.22 + ringDiff * 0.05, 0.42 + ringDiff * 0.12);
        }
      }

      // Flash override for sequence firing
      if (flashTimer[n] > 0) {
        const fl = flashTimer[n] / FLASH_DUR;
        col = new THREE.Color().lerpColors(C_TEAL, C_WHITE, fl);
        radius = R + 0.4 * fl;
      }

      mesh.position.set(radius * Math.cos(angle), radius * Math.sin(angle), z);
      mesh.material.color.copy(col);
      mesh.material.opacity = fade * (PENTAGON.has(n) ? 0.6 : 1.0);
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate(0);
</script>
